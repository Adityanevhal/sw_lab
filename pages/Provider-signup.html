<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signup Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: url('../assets/images/1755863042727.jpg') no-repeat center center/cover;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      background: rgba(255,255,255,0.9);
      padding: 20px;
      border-radius: 10px;
      width: 350px;
      text-align: center;
    }
    input, select, button {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      background: #007bff;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Signup</h2>
    <form id="signupForm">
      <input type="text" id="name" placeholder="Name" required>
      <input type="text" id="username" placeholder="Username" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <input type="number" id="age" placeholder="Age" required>
      <input type="text" id="address" placeholder="Address" required>
      <input type="number" id="contactno" placeholder="Contact no" required>
      <button type="submit">Sign Up</button>
    </form>
  </div>

  <script>
    const providerForm = document.getElementById("signupForm");

    const getProviders = () => JSON.parse(localStorage.getItem("providerUsers") || "[]");
    const saveProviders = (users) => localStorage.setItem("providerUsers", JSON.stringify(users));

    providerForm.addEventListener("submit", (e) => {
      e.preventDefault();

      const name = document.getElementById("name").value.trim();
      const username = document.getElementById("username").value.trim();
      const email = document.getElementById("email").value.trim().toLowerCase();
      const password = document.getElementById("password").value;
      const age = document.getElementById("age").value.trim();
      const address = document.getElementById("address").value.trim();
      const contactno = document.getElementById("contactno").value.trim();

      const providers = getProviders();
      if (providers.some((u) => u.email === email)) {
        alert("Email already registered. Please log in.");
        return;
      }

      providers.push({ name, username, email, password, age, address, contactno });
      saveProviders(providers);

      alert("Signup successful! Redirecting to login...");
      window.location.href = "Provider-login.html";
    });
  </script>
</body>
</html>
